name: Live MCP Validation

on:
  workflow_dispatch:
    inputs:
      snowflake_role:
        description: Snowflake role that matches the PAT role restriction.
        required: true
        default: NAC
      run_notebook_pack:
        description: Execute the live core notebook pack.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_langgraph_notebook:
        description: Execute the live LangGraph runtime notebook.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  live-mcp:
    name: Live managed MCP validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      METATATE_EXAMPLES_MODE: live
      METATATE_MCP_URL: ${{ secrets.METATATE_MCP_URL }}
      METATATE_MCP_PAT_ENV: METATATE_EXAMPLES_PAT
      METATATE_EXAMPLES_PAT: ${{ secrets.METATATE_EXAMPLES_PAT }}
      METATATE_MCP_TOKEN_TYPE: PROGRAMMATIC_ACCESS_TOKEN
      METATATE_MCP_TIMEOUT_SECONDS: "120"
      METATATE_MCP_RETRY_ATTEMPTS: "4"
      METATATE_MCP_RETRY_BACKOFF_SECONDS: "1"
      SNOWFLAKE_ROLE: ${{ inputs.snowflake_role }}
      JUPYTER_BIN: jupyter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-live.txt
            requirements-framework.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-live.txt
          pip install -r requirements-framework.txt

      - name: Validate required secrets
        run: |
          test -n "${METATATE_MCP_URL}"
          test -n "${METATATE_EXAMPLES_PAT}"

      - name: Static validation
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/validate_examples.py

      - name: Live CI/CD policy gate acceptance
        run: scripts/run_cicd_policy_gate_acceptance.sh

      - name: Live human exception workflow acceptance
        run: scripts/run_human_exception_workflow_acceptance.sh

      - name: Live framework runtime acceptance
        run: scripts/run_framework_runtime_acceptance.sh

      - name: Execute live core notebook pack
        if: inputs.run_notebook_pack == 'true'
        env:
          METATATE_NOTEBOOK_OUTPUT_DIR: ${{ runner.temp }}/metatate-examples-live-notebooks
        run: scripts/run_notebook_pack.sh

      - name: Execute live LangGraph runtime notebook
        if: inputs.run_langgraph_notebook == 'true'
        env:
          METATATE_NOTEBOOK_OUTPUT_DIR: ${{ runner.temp }}/metatate-examples-live-langgraph-notebook
        run: scripts/run_langgraph_runtime_notebook.sh
