name: Offline CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  offline:
    name: Offline examples validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-live.txt
            requirements-framework.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-live.txt
          pip install -r requirements-framework.txt

      - name: Static validation
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/validate_examples.py

      - name: Shell syntax
        run: bash -n scripts/*.sh

      - name: Python compile
        run: |
          python -m compileall \
            common \
            cicd_policy_gate \
            cortex_agent_runtime \
            framework_runtime \
            human_exception_workflow \
            scripts/build_notebooks.py \
            scripts/validate_examples.py

      - name: CI/CD policy gate acceptance
        run: scripts/run_cicd_policy_gate_acceptance.sh

      - name: CI/CD policy gate CLI
        run: |
          scripts/run_cicd_policy_gate.sh
          if scripts/run_cicd_policy_gate.sh --strict; then
            echo "Expected strict CI gate to fail for denied sample changes" >&2
            exit 1
          fi
          echo "Strict CI gate failed as expected for denied sample changes."

      - name: Human exception workflow acceptance
        run: scripts/run_human_exception_workflow_acceptance.sh

      - name: Human exception workflow CLI
        run: |
          scripts/run_human_exception_workflow.sh
          if scripts/run_human_exception_workflow.sh --fail-on-blocked; then
            echo "Expected human exception workflow to fail when blocked requests are present" >&2
            exit 1
          fi
          echo "Human exception workflow failed as expected for the denied training request."

      - name: Framework runtime acceptance
        run: scripts/run_framework_runtime_acceptance.sh

      - name: Execute offline notebook pack
        env:
          JUPYTER_BIN: jupyter
          METATATE_NOTEBOOK_OUTPUT_DIR: ${{ runner.temp }}/metatate-examples-offline-notebooks
        run: scripts/run_notebook_pack.sh
